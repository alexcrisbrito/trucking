services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: trucking
    volumes:
        - postgres-data:/var/lib/postgresql/data

networks:
  default:
    driver: bridge

volumes:
  postgres-data: